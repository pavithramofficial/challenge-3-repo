<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChromaShift // Vision Simulator</title>
    <style>
        /* Neo-Memphis Design Tokens */
        :root {
            --bg-color: #f0f0e8;
            --primary: #ff5e97;
            --secondary: #3ddc97;
            --accent: #ffdc00;
            --dark: #1a1a1a;
            --white: #ffffff;
            --border-thick: 4px solid #1a1a1a;
            --shadow-neo: 8px 8px 0px #1a1a1a;
            --shadow-neo-sm: 4px 4px 0px #1a1a1a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 900;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--dark) 15%, transparent 16%),
                              radial-gradient(var(--dark) 15%, transparent 16%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            color: var(--dark);
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: var(--accent);
            border: var(--border-thick);
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-neo);
            transform: rotate(-1deg);
        }

        header h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        header p {
            margin-top: 0.5rem;
            background: var(--white);
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border: 2px solid var(--dark);
        }

        .workspace {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .workspace {
                grid-template-columns: 1fr;
            }
        }

        .controls-panel {
            background: var(--secondary);
            border: var(--border-thick);
            padding: 1.5rem;
            box-shadow: var(--shadow-neo);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            height: fit-content;
        }

        .panel-title {
            font-size: 1.2rem;
            text-transform: uppercase;
            background: var(--white);
            padding: 0.5rem;
            border: 2px solid var(--dark);
            text-align: center;
        }

        .file-upload-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .btn-upload {
            border: var(--border-thick);
            background: var(--primary);
            color: var(--white);
            padding: 1rem;
            font-size: 1rem;
            text-align: center;
            width: 100%;
            cursor: pointer;
            box-shadow: var(--shadow-neo-sm);
            transition: 0.1s ease;
            text-transform: uppercase;
        }

        .btn-upload:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--dark);
        }

        .file-upload-wrapper input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .mode-selector {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .mode-option {
            background: var(--white);
            border: var(--border-thick);
            padding: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: var(--shadow-neo-sm);
            transition: 0.1s ease;
        }

        .mode-option:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--dark);
        }

        .mode-option input[type="radio"] {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 3px solid var(--dark);
            background-color: var(--white);
            cursor: pointer;
            position: relative;
        }

        .mode-option input[type="radio"]:checked {
            background-color: var(--primary);
        }

        .mode-option input[type="radio"]:checked::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 8px;
            height: 8px;
            background: var(--dark);
        }

        .mode-label {
            display: flex;
            flex-direction: column;
        }

        .mode-description {
            font-size: 0.75rem;
            font-weight: normal;
            color: #555;
            margin-top: 0.2rem;
        }

        .display-arena {
            background: var(--white);
            border: var(--border-thick);
            padding: 1.5rem;
            box-shadow: var(--shadow-neo);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            min-height: 500px;
        }

        .view-tabs {
            display: flex;
            gap: 1rem;
            border-bottom: var(--border-thick);
            padding-bottom: 1rem;
        }

        .tab-btn {
            background: var(--bg-color);
            border: var(--border-thick);
            padding: 0.5rem 1rem;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: var(--shadow-neo-sm);
        }

        .tab-btn.active {
            background: var(--accent);
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--dark);
        }

        .viewer-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            align-items: center;
            justify-items: center;
            flex-grow: 1;
        }

        .viewer-container.split-view {
            grid-template-columns: 1fr 1fr;
        }

        @media (max-width: 768px) {
            .viewer-container.split-view {
                grid-template-columns: 1fr;
            }
        }

        .image-card {
            background: var(--white);
            border: var(--border-thick);
            padding: 0.7rem;
            box-shadow: var(--shadow-neo-sm);
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
        }

        .image-card h3 {
            background: var(--dark);
            color: var(--white);
            padding: 0.25rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .canvas-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #e0e0e0;
            border: 2px dashed var(--dark);
            min-height: 300px;
            overflow: hidden;
        }

        canvas, img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
            display: block;
        }

        .placeholder-text {
            padding: 2rem;
            text-align: center;
            color: var(--dark);
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>ChromaShift //</h1>
            <p>Color Vision Deficiency Simulator</p>
        </header>

        <div class="workspace">
            <aside class="controls-panel">
                <div class="panel-title">01 / Input</div>
                <div class="file-upload-wrapper">
                    <button class="btn-upload">Load Image</button>
                    <input type="file" id="imageLoader" accept="image/*" />
                </div>

                <div class="panel-title">02 / Deficiency Mode</div>
                <div class="mode-selector">
                    <label class="mode-option">
                        <input type="radio" name="cvdMode" value="normal" checked>
                        <div class="mode-label">
                            <span>Normal Vision</span>
                            <span class="mode-description">Standard trichromacy</span>
                        </div>
                    </label>
                    <label class="mode-option">
                        <input type="radio" name="cvdMode" value="protanopia">
                        <div class="mode-label">
                            <span>Protanopia</span>
                            <span class="mode-description">Red blind (No L-cones)</span>
                        </div>
                    </label>
                    <label class="mode-option">
                        <input type="radio" name="cvdMode" value="deuteranopia">
                        <div class="mode-label">
                            <span>Deuteranopia</span>
                            <span class="mode-description">Green blind (No M-cones)</span>
                        </div>
                    </label>
                    <label class="mode-option">
                        <input type="radio" name="cvdMode" value="tritanopia">
                        <div class="mode-label">
                            <span>Tritanopia</span>
                            <span class="mode-description">Blue blind (No S-cones)</span>
                        </div>
                    </label>
                    <label class="mode-option">
                        <input type="radio" name="cvdMode" value="achromatopsia">
                        <div class="mode-label">
                            <span>Achromatopsia</span>
                            <span class="mode-description">Total color blindness</span>
                        </div>
                    </label>
                </div>
            </aside>

            <main class="display-arena">
                <div class="view-tabs">
                    <button class="tab-btn active" id="tabCompare">Side-by-Side</button>
                    <button class="tab-btn" id="tabSimulated">Simulated Only</button>
                </div>

                <div class="viewer-container split-view" id="viewerContainer">
                    <div class="image-card" id="originalCard">
                        <h3>Original Spectrum</h3>
                        <div class="canvas-wrapper">
                            <div id="origPlaceholder" class="placeholder-text">Drop or upload file</div>
                            <canvas id="canvasOriginal" style="display:none;"></canvas>
                        </div>
                    </div>

                    <div class="image-card">
                        <h3 id="simulatedTitle">Simulated Spectrum</h3>
                        <div class="canvas-wrapper">
                            <div id="simPlaceholder" class="placeholder-text">Awaiting source matrix</div>
                            <canvas id="canvasSimulated" style="display:none;"></canvas>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const imageLoader = document.getElementById('imageLoader');
        const canvasOriginal = document.getElementById('canvasOriginal');
        const canvasSimulated = document.getElementById('canvasSimulated');
        const ctxOrig = canvasOriginal.getContext('2d', { willReadFrequently: true });
        const ctxSim = canvasSimulated.getContext('2d');

        const origPlaceholder = document.getElementById('origPlaceholder');
        const simPlaceholder = document.getElementById('simPlaceholder');
        const originalCard = document.getElementById('originalCard');
        const viewerContainer = document.getElementById('viewerContainer');
        const simulatedTitle = document.getElementById('simulatedTitle');

        const tabCompare = document.getElementById('tabCompare');
        const tabSimulated = document.getElementById('tabSimulated');

        let loadedImage = null;
        let currentMode = 'normal';

        const matrices = {
            protanopia: [
                0.152286, 0.847714, 0.000000,
                0.114703, 0.885297, 0.000000,
                0.003180, 0.031267, 0.965553
            ],
            deuteranopia: [
                0.367322, 0.632678, 0.000000,
                0.280085, 0.719915, 0.000000,
                -0.011820, 0.011820, 1.000000
            ],
            tritanopia: [
                1.015354, -0.015354, 0.000000,
                0.076366, 0.923634, 0.000000,
                -0.005574, 0.950796, 0.054778
            ],
            achromatopsia: [
                0.299, 0.587, 0.114,
                0.299, 0.587, 0.114,
                0.299, 0.587, 0.114
            ]
        };

        imageLoader.addEventListener('change', handleImage, false);

        function handleImage(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                loadedImage = new Image();
                loadedImage.onload = function() {
                    setupCanvases();
                    applyCVD();
                };
                loadedImage.src = event.target.result;
            };
            if (e.target.files[0]) {
                reader.readAsDataURL(e.target.files[0]);
            }
        }

        function setupCanvases() {
            origPlaceholder.style.display = 'none';
            simPlaceholder.style.display = 'none';
            canvasOriginal.style.display = 'block';
            canvasSimulated.style.display = 'block';

            const maxDimension = 800;
            let width = loadedImage.width;
            let height = loadedImage.height;

            if (width > maxDimension || height > maxDimension) {
                if (width > height) {
                    height *= maxDimension / width;
                    width = maxDimension;
                } else {
                    width *= maxDimension / height;
                    height = maxDimension;
                }
            }

            canvasOriginal.width = width;
            canvasOriginal.height = height;
            canvasSimulated.width = width;
            canvasSimulated.height = height;

            ctxOrig.drawImage(loadedImage, 0, 0, width, height);
        }

        function applyCVD() {
            if (!loadedImage) return;

            const width = canvasOriginal.width;
            const height = canvasOriginal.height;

            ctxSim.drawImage(canvasOriginal, 0, 0);

            if (currentMode === 'normal') {
                simulatedTitle.textContent = 'Simulated Spectrum: Normal';
                return;
            }

            simulatedTitle.textContent = `Simulated Spectrum: ${currentMode}`;

            const imgData = ctxOrig.getImageData(0, 0, width, height);
            const data = imgData.data;
            const m = matrices[currentMode];

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];

                const nx = (r * m[0] + g * m[1] + b * m[2]);
                const ny = (r * m[3] + g * m[4] + b * m[5]);
                const nz = (r * m[6] + g * m[7] + b * m[8]);

                data[i] = nx > 255 ? 255 : (nx < 0 ? 0 : nx);
                data[i + 1] = ny > 255 ? 255 : (ny < 0 ? 0 : ny);
                data[i + 2] = nz > 255 ? 255 : (nz < 0 ? 0 : nz);
            }

            ctxSim.putImageData(imgData, 0, 0);
        }

        document.querySelectorAll('input[name="cvdMode"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                currentMode = e.target.value;
                applyCVD();
            });
        });

        tabCompare.addEventListener('click', () => {
            tabCompare.classList.add('active');
            tabSimulated.classList.remove('active');
            viewerContainer.classList.add('split-view');
            originalCard.style.display = 'flex';
        });

        tabSimulated.addEventListener('click', () => {
            tabSimulated.classList.add('active');
            tabCompare.classList.remove('active');
            viewerContainer.classList.remove('split-view');
            originalCard.style.display = 'none';
        });
    </script>
</body>
</html>
